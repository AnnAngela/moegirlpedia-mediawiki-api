name: Test

permissions:
  contents: read

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - name: Installing the dependencies
        uses: AnnAngela/cached_node-modules@v5

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
