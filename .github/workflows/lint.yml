name: Lint

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: lts/*

      - name: Installing the dependencies
        uses: AnnAngela/cached_node-modules@v5

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
